version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/tonimelisma/onedrive-go

linters:
  default: none
  enable:
    - bodyclose
    - containedctx
    - copyloopvar
    - contextcheck
    - depguard
    - dogsled
    - dupl
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - forbidigo
    - funlen
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - loggercheck
    - misspell
    - mnd
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - staticcheck
    - tagliatelle
    - testifylint
    - thelper
    - unconvert
    - unparam
    - unused
    - whitespace
    - wrapcheck

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment

    depguard:
      rules:
        main:
          files:
            - "**/*.go"
          allow:
            - $gostd
            - github.com/tonimelisma/onedrive-go
            - github.com/BurntSushi/toml
            - github.com/stretchr/testify
            - golang.org/x/oauth2
            - github.com/spf13/cobra
            - github.com/spf13/pflag
            - github.com/inconshreveable/mousetrap
            - golang.org/x/text
            - golang.org/x/time
            - modernc.org/sqlite
            - modernc.org/libc
            - modernc.org/mathutil
            - modernc.org/memory
            - github.com/pressly/goose/v3
            - github.com/google/uuid
            - github.com/fsnotify/fsnotify
            - github.com/coder/websocket
            - golang.org/x/sync
            - github.com/mattn/go-isatty
        graph-no-config:
          files:
            - internal/graph/*.go
            - "!$test"
          deny:
            - pkg: github.com/tonimelisma/onedrive-go/internal/config$
              desc: graph boundary must not import internal/config
        driveops-no-sync:
          files:
            - internal/driveops/*.go
            - "!$test"
          deny:
            - pkg: github.com/tonimelisma/onedrive-go/internal/sync$
              desc: driveops must not import internal/sync
        leaf-internal:
          files:
            - internal/driveid/*.go
            - internal/tokenfile/*.go
            - internal/retry/*.go
            - "!$test"
          deny:
            - pkg: github.com/tonimelisma/onedrive-go/internal/
              desc: leaf packages must not import other internal packages

    forbidigo:
      analyze-types: true
      forbid:
        - pattern: ^os\.(Open|OpenFile|ReadFile|WriteFile|Create|CreateTemp|Mkdir|MkdirAll|ReadDir|Stat|Lstat|Remove|RemoveAll|Rename|Chmod|Chtimes|Symlink|Readlink|Truncate)$
          msg: use fsroot, synctree, or localpath filesystem boundaries instead of raw os.* calls
        - pattern: ^time\.Sleep$
          msg: use explicit test synchronization instead of wall-clock sleep

    gocyclo:
      min-complexity: 15

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - paramTypeCombine
        - unnamedResult
        - whyNoLint
        - wrapperFunc
        - importShadow
      settings:
        hugeParam:
          # CanonicalID is 96 bytes (6 string fields) — an immutable value type
          # used as map keys and implementing encoding.TextMarshaler. Value
          # receivers are required; raising from 80 to 128 is appropriate.
          sizeThreshold: 128

    dupl:
      threshold: 100

    funlen:
      lines: 100
      statements: 50

    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
      ignored-numbers:
        - '0'
        - '1'
        - '2'
        - '3'
        - '200'
        - '201'
        - '400'
        - '401'
        - '403'
        - '404'
        - '429'
        - '500'

    goconst:
      min-len: 2
      min-occurrences: 2

    gosec:
      excludes:
        - G104
        - G115  # integer overflow: false positive on intentional truncation (quickxorhash)
        - G602  # slice bounds: false positive on backwards iteration (quickxorhash)

    lll:
      line-length: 140

    misspell:
      locale: US

    nakedret:
      max-func-lines: 30

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    staticcheck:
      checks: ["all", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]

    tagliatelle:
      case:
        rules:
          json: snake
          toml: snake
        overrides:
          - pkg: internal/graph
            rules:
              json: camel
            use-field-name: false
            ignored-fields:
              - ConflictBehavior
              - DeltaLink
              - DownloadURL
              - NextLink

    unparam:
      check-exported: false

    whitespace:
      multi-if: false
      multi-func: false

    exhaustive:
      default-signifies-exhaustive: false

    errcheck:
      check-type-assertions: true
      check-blank: true

  exclusions:
    generated: lax
    warn-unused: true
    rules:
      - linters:
          - gocritic
        text: "unnecessaryDefer:"
      # Test mock implementations mirror interfaces and can't be shortened
      - linters:
          - lll
        path: _test\.go
      # Defer close patterns are standard in Go HTTP clients
      - linters:
          - errcheck
        source: "defer "
      - path: _test\.go
        linters:
          - forbidigo
        text: use fsroot, synctree, or localpath filesystem boundaries instead of raw os\.\* calls
      - path: internal/devtool/
        linters:
          - forbidigo
        text: use fsroot, synctree, or localpath filesystem boundaries instead of raw os\.\* calls
      - path-except: _test\.go
        linters:
          - forbidigo
        text: use explicit test synchronization instead of wall-clock sleep
      - path: internal/(fsroot|synctree|localpath)/
        linters:
          - forbidigo
      - path: internal/devtool/(fsutil|live_env)\.go
        linters:
          - gosec
