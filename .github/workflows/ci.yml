name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 10 * * *' # 10 AM UTC (3 AM PDT) — keeps refresh tokens alive
  workflow_dispatch:

# Cancel stale PR runs; never cancel push/schedule runs.
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write # OIDC federation with Azure (integration + e2e jobs)

jobs:
  # --- Always-run jobs (including fork PRs) ---
  # Skip push-to-main for PR merges (squash commits contain "(#NNN)").
  # All main commits go through PRs (branch protection enforces this),
  # so push-to-main CI is effectively always skipped. Schedule and
  # dispatch still trigger all jobs.

  verify:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '(#')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install format tools
        run: |
          set -euo pipefail
          go install mvdan.cc/gofumpt@v0.9.2
          go install golang.org/x/tools/cmd/goimports@v0.41.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          install-only: true

      - name: Verify
        env:
          COVERAGE_THRESHOLD: "76.0"
        run: go run ./cmd/devtool verify public --coverage-threshold "${COVERAGE_THRESHOLD}"

  stress:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Stress verify
        run: go run ./cmd/devtool verify stress

  # --- Live API jobs (skip on forks — no OIDC trust) ---
  # Each job uses its own dedicated test account so they run in parallel
  # without OAuth token refresh races.

  integration:
    runs-on: ubuntu-latest
    if: >-
      vars.AZURE_CLIENT_ID != ''
      && (github.event_name != 'push' || !contains(github.event.head_commit.message, '(#'))
    env:
      ONEDRIVE_TEST_DRIVE: ${{ vars.ONEDRIVE_TEST_DRIVE_INTEGRATION }}
      ONEDRIVE_ALLOWED_TEST_ACCOUNTS: ${{ vars.ONEDRIVE_ALLOWED_TEST_ACCOUNTS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Azure OIDC login (attempt 1)
        id: azure_login_integration
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Azure OIDC login (retry)
        if: steps.azure_login_integration.outcome == 'failure'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Download credentials to .testdata/
        run: |
          set -euo pipefail
          mkdir -p .testdata

          # Download config.
          az keyvault secret download \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "onedrive-test-config" \
            --file ".testdata/config.toml" \
            --encoding utf-8

          # Download cache file for this job's drive.
          SANITIZED=$(echo "$ONEDRIVE_TEST_DRIVE" | sed 's/[:@._]/-/g')
          SECRET_NAME="onedrive-cache-${SANITIZED}"

          SANITIZED_FILE=$(echo "$ONEDRIVE_TEST_DRIVE" | sed 's/:/_/')
          TOKEN_FILE="token_${SANITIZED_FILE}.json"

          echo "Downloading: ${SECRET_NAME} → .testdata/${TOKEN_FILE}"
          az keyvault secret download \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "$SECRET_NAME" \
            --file ".testdata/${TOKEN_FILE}" \
            --encoding utf-8

          # Download account profile and drive metadata (flat layout).
          ACCOUNT_SECRET="onedrive-account-${SANITIZED}"
          ACCOUNT_FILE="account_${SANITIZED_FILE}.json"
          echo "Downloading: ${ACCOUNT_SECRET} → .testdata/${ACCOUNT_FILE}"
          az keyvault secret download \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "$ACCOUNT_SECRET" \
            --file ".testdata/${ACCOUNT_FILE}" \
            --encoding utf-8 || echo "::warning::Account profile not found (non-fatal)"

          DRIVEMETA_SECRET="onedrive-drivemeta-${SANITIZED}"
          DRIVEMETA_FILE="drive_${SANITIZED_FILE}.json"
          echo "Downloading: ${DRIVEMETA_SECRET} → .testdata/${DRIVEMETA_FILE}"
          az keyvault secret download \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "$DRIVEMETA_SECRET" \
            --file ".testdata/${DRIVEMETA_FILE}" \
            --encoding utf-8 || echo "::warning::Drive metadata not found (non-fatal)"

          echo "=== .testdata/ contents ==="
          ls -la .testdata/

      - name: Run integration tests
        run: |
          set -euo pipefail
          echo "=== Integration tests for: ${ONEDRIVE_TEST_DRIVE} ==="
          go run ./cmd/devtool verify integration

      - name: Save rotated token to Key Vault
        if: always()
        run: |
          set -euo pipefail
          SANITIZED_FILE=$(echo "$ONEDRIVE_TEST_DRIVE" | sed 's/:/_/')
          TOKEN_PATH=".testdata/token_${SANITIZED_FILE}.json"
          SANITIZED=$(echo "$ONEDRIVE_TEST_DRIVE" | sed 's/[:@._]/-/g')
          SECRET_NAME="onedrive-cache-${SANITIZED}"

          if [ ! -f "$TOKEN_PATH" ]; then
            echo "::warning::Token file missing — skipping save"
            exit 0
          fi

          echo "Saving rotated token"
          az keyvault secret set \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "$SECRET_NAME" \
            --file "$TOKEN_PATH" \
            --content-type "application/json" \
            --output none

  e2e:
    runs-on: ubuntu-latest
    if: >-
      vars.AZURE_CLIENT_ID != ''
      && (github.event_name != 'push' || !contains(github.event.head_commit.message, '(#'))
    env:
      ONEDRIVE_TEST_DRIVE: ${{ vars.ONEDRIVE_TEST_DRIVE_E2E }}
      ONEDRIVE_TEST_DRIVE_2: ${{ vars.ONEDRIVE_TEST_DRIVE_E2E_2 }}
      ONEDRIVE_ALLOWED_TEST_ACCOUNTS: ${{ vars.ONEDRIVE_ALLOWED_TEST_ACCOUNTS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Azure OIDC login (attempt 1)
        id: azure_login_e2e
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Azure OIDC login (retry)
        if: steps.azure_login_e2e.outcome == 'failure'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Download credentials to .testdata/
        run: |
          set -euo pipefail
          mkdir -p .testdata

          # Download config.
          az keyvault secret download \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "onedrive-test-config" \
            --file ".testdata/config.toml" \
            --encoding utf-8

          az keyvault secret download \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "onedrive-test-fixtures-env" \
            --file ".testdata/fixtures.env" \
            --encoding utf-8

          # Download token, account profile, and drive metadata for each test drive.
          for DRIVE_VAR in ONEDRIVE_TEST_DRIVE ONEDRIVE_TEST_DRIVE_2; do
            DRIVE_VAL="${!DRIVE_VAR:-}"
            if [ -z "$DRIVE_VAL" ]; then
              continue
            fi

            SANITIZED=$(echo "$DRIVE_VAL" | sed 's/[:@._]/-/g')
            SECRET_NAME="onedrive-cache-${SANITIZED}"

            SANITIZED_FILE=$(echo "$DRIVE_VAL" | sed 's/:/_/')
            TOKEN_FILE="token_${SANITIZED_FILE}.json"

            echo "Downloading: ${SECRET_NAME} → .testdata/${TOKEN_FILE}"
            az keyvault secret download \
              --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
              --name "$SECRET_NAME" \
              --file ".testdata/${TOKEN_FILE}" \
              --encoding utf-8

            # Account profile and drive metadata (flat layout).
            ACCOUNT_FILE="account_${SANITIZED_FILE}.json"
            ACCOUNT_SECRET="onedrive-account-${SANITIZED}"
            echo "Downloading: ${ACCOUNT_SECRET} → .testdata/${ACCOUNT_FILE}"
            az keyvault secret download \
              --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
              --name "$ACCOUNT_SECRET" \
              --file ".testdata/${ACCOUNT_FILE}" \
              --encoding utf-8 || echo "::warning::Account profile for ${DRIVE_VAR} not found (non-fatal)"

            DRIVEMETA_SECRET="onedrive-drivemeta-${SANITIZED}"
            DRIVEMETA_FILE="drive_${SANITIZED_FILE}.json"
            echo "Downloading: ${DRIVEMETA_SECRET} → .testdata/${DRIVEMETA_FILE}"
            az keyvault secret download \
              --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
              --name "$DRIVEMETA_SECRET" \
              --file ".testdata/${DRIVEMETA_FILE}" \
              --encoding utf-8 || echo "::warning::Drive metadata for ${DRIVE_VAR} not found (non-fatal)"
          done

          echo "=== .testdata/ contents ==="
          ls -la .testdata/

      - name: Run E2E tests
        run: |
          set -euo pipefail
          profile=e2e
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            profile=e2e-full
          fi
          go run ./cmd/devtool verify "$profile" --e2e-log-dir /tmp/e2e-debug-logs

      - name: Upload E2E debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-debug-logs
          path: /tmp/e2e-debug-logs/
          retention-days: 7

      - name: Save rotated tokens to Key Vault
        if: always()
        run: |
          set -euo pipefail
          for DRIVE_VAR in ONEDRIVE_TEST_DRIVE ONEDRIVE_TEST_DRIVE_2; do
            DRIVE_VAL="${!DRIVE_VAR:-}"
            if [ -z "$DRIVE_VAL" ]; then
              continue
            fi

            SANITIZED_FILE=$(echo "$DRIVE_VAL" | sed 's/:/_/')
            TOKEN_PATH=".testdata/token_${SANITIZED_FILE}.json"
            SANITIZED=$(echo "$DRIVE_VAL" | sed 's/[:@._]/-/g')
            SECRET_NAME="onedrive-cache-${SANITIZED}"

            if [ ! -f "$TOKEN_PATH" ]; then
              echo "::warning::Token file for ${DRIVE_VAR} missing — skipping save"
              continue
            fi

            echo "Saving rotated token for ${DRIVE_VAR}"
            az keyvault secret set \
              --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
              --name "$SECRET_NAME" \
              --file "$TOKEN_PATH" \
              --content-type "application/json" \
              --output none
          done

      - name: Auth failure guidance
        if: failure()
        run: |
          echo "::warning::E2E test auth may have failed."
          echo "::warning::If the refresh token has expired (90 days idle), re-bootstrap."
          echo "::warning::See CLAUDE.md 'Test Credentials' section for re-bootstrap instructions."
